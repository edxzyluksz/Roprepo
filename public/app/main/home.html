<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Roprepo</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/pages/home.css">
    <link rel="shortcut icon" href="../../assets/icons/roprepo-icon.png" type="image/x-icon">

<body class="dark-mode">
    <header>
        <div class="roprepo-logo">
            <a href="app/home.html" class="roprepo-link">
                <img class="roprepo-logo-img" src="../../assets/icons/roprepo-title-dark.png" alt="roprepo-logo">
            </a>
        </div>
        <nav class="page-switch">
            <a href="charts.html" class="nav-link">Charts</a>
            <a href="catalog.html" class="nav-link">Marketplace</a>
            <a href="robux.html" class="nav-link">Robux</a>
        </nav>
        <input type="search" name="search" class="search-bar" placeholder="Find our games..." autocomplete="off">
        <div class="user-section">
            <!-- Busca a foto do usuário atribuída no Banco de Dados -->
            <a href="profile.html" class="profile-src"><img src="https://avatars.githubusercontent.com/u/224140838?v=4" alt="profile picture" class="user-pfp"></a>
            <a class="robux-card">
                <img src="../../assets/img/roblox-2019-logo-gold.png" alt="Robux Icon" class="robux">
                <p>R$ 0</p>
            </a>
            <button class="theme-mode">
                <img src="../../assets/icons/theme-toggle.png" alt="Change Theme" class="theme-mode-img">
            </button>
        </div>
